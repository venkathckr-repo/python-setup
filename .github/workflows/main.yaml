name: Python Environment Setup

on: [push] # Trigger the workflow on every push to any branch

jobs:
  build:
    runs-on: self-hosted # Use the latest Ubuntu runner environment

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # Action to check out your repository code

    - name: Set up Python 3.9
      uses: actions/setup-python@v5 # Action to set up a Python environment
      with:
        python-version: '3.9' # Specify Python version 3.9

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check Python Version
      run: |
        # Command to verify the installed Python version
        python --version

    - name: Run Flake8 Linting
      run: |
        # Command to verify flake8 installation by checking its version
        flake8 --version

    - name: Run Pytest
      run: |
        # Command to verify pytest installation by checking its version
        pytest --version